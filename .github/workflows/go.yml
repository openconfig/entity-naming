name: Go

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions: {}

jobs:
  go:
    uses: openconfig/common-ci/.github/workflows/basic_go.yml@abb79c974d34c0ec6cda3bcfcb2edb6679d197e1
    with:
      skip-staticcheck: true
    permissions:
      contents: read
      statuses: write
